name: CalTrack CI Pipeline

on:
  push:
    branches: [ main, master, dev, staging ]
  pull_request:
    branches: [ main, master, dev, staging ]

jobs:
  build-and-verify:
    name: Build & TypeScript Compilation Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js (v20)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Monorepo Dependencies
        run: npm ci

      - name: Validate Database Schema Types Generation
        run: npm run prisma:generate

      - name: Run TypeScript Compile Check (tsc --noEmit)
        run: |
          npm run build --workspace=@caltrack/types
          npm run build --workspace=@caltrack/utils
          npm run build --workspace=@caltrack/ai
          npm run build --workspace=@caltrack/api
          npm run build --workspace=@caltrack/web

      - name: Build Monorepo Workspaces
        run: npm run build
